<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="국기 퀴즈">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1D4ED8">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <title>🌍 국기 퀴즈</title>
  <style>
    :root {
      --bg:      #0D1B3E;
      --card:    rgba(255,255,255,.08);
      --border:  rgba(255,255,255,.12);
      --accent:  #FBBF24;
      --correct: #22C55E;
      --wrong:   #EF4444;
      --text2:   rgba(255,255,255,.55);
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
    html,body { width:100%; height:100%; overflow:hidden; font-family:'Jua','Apple SD Gothic Neo',sans-serif; background:var(--bg); }

    .screen { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
      background:linear-gradient(160deg,#0D1B3E 0%,#1E3A8A 55%,#0D1B2A 100%); padding:20px; }
    .screen.active { display:flex; }

    /* 버튼 */
    .btn { border:none; border-radius:50px; font-family:'Jua',sans-serif; cursor:pointer; transition:transform .1s,opacity .1s; }
    .btn:active { transform:scale(.94); opacity:.9; }
    .btn-primary { background:var(--accent); color:#1a0a00; font-size:20px; padding:16px 48px;
      box-shadow:0 4px 0 #92400e,0 6px 20px rgba(251,191,36,.35); }
    .btn-ghost { background:rgba(255,255,255,.1); color:#fff; font-size:15px; padding:11px 28px; }

    /* ── 홈 ── */
    #s-home { gap:12px; }
    .home-title { font-size:38px; color:#fff; text-align:center; }
    .home-sub { color:var(--text2); font-size:15px; text-align:center; margin-bottom:4px; }
    .home-best { color:var(--accent); font-size:16px; text-align:center; margin-bottom:8px; }
    .home-btns { display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; max-width:280px; }
    .home-btns .btn { width:100%; text-align:center; }

    /* 난이도 */
    .diff-row { display:flex; gap:8px; margin-bottom:4px; }
    .diff-chip { background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); border-radius:24px;
      padding:8px 18px; color:#fff; font-family:'Jua',sans-serif; font-size:14px; cursor:pointer; transition:all .15s; }
    .diff-chip.active { border-color:var(--accent); background:rgba(251,191,36,.15); color:var(--accent); }

    /* ── 게임 ── */
    #s-game { justify-content:flex-start; padding-top:env(safe-area-inset-top,20px); gap:0; }
    .game-header { width:100%; max-width:480px; display:flex; align-items:center; justify-content:space-between;
      padding:12px 0 10px; }
    .lives { display:flex; gap:6px; }
    .stage-badge { background:rgba(255,255,255,.1); border-radius:20px; padding:6px 16px; color:#fff; font-size:14px; }
    .stage-badge em { color:var(--accent); font-style:normal; font-size:18px; }

    /* 타이머 */
    .timer-wrap { width:100%; max-width:480px; display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .timer-bar { flex:1; height:10px; background:rgba(255,255,255,.12); border-radius:5px; overflow:hidden; }
    .timer-fill { height:100%; background:linear-gradient(90deg,#22C55E,#86EFAC); border-radius:5px; transition:width .1s linear, background .3s; }
    .timer-fill.warn { background:linear-gradient(90deg,#F59E0B,#FCD34D); }
    .timer-fill.danger { background:linear-gradient(90deg,#EF4444,#FCA5A5); }
    .timer-num { font-size:16px; color:var(--text2); min-width:28px; text-align:right; }

    /* 국기 */
    .flag-wrap { width:100%; max-width:480px; background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.12);
      border-radius:20px; padding:18px; display:flex; align-items:center; justify-content:center;
      margin-bottom:16px; min-height:160px; }
    .flag-img { max-width:260px; max-height:180px; width:100%; height:auto;
      object-fit:contain; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.35); display:block; }

    /* 보기 */
    .choices { width:100%; max-width:480px; display:flex; flex-direction:column; gap:10px; }
    .choice-btn { background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); border-radius:16px;
      padding:16px; color:#fff; font-family:'Jua',sans-serif; font-size:1.05rem; text-align:center;
      cursor:pointer; transition:all .15s; }
    .choice-btn:active { transform:scale(.97); }
    .choice-btn.correct { border-color:var(--correct); background:rgba(34,197,94,.18); color:var(--correct); }
    .choice-btn.wrong   { border-color:var(--wrong);   background:rgba(239,68,68,.18);  color:var(--wrong); }
    .choice-btn.disabled { cursor:default; pointer-events:none; }

    /* ── 게임오버 ── */
    #s-over { gap:14px; }
    .over-emoji { font-size:64px; }
    .over-title { font-size:30px; color:#fff; }
    .over-stage { font-size:52px; font-weight:900; color:var(--accent); }
    .over-label { font-size:15px; color:var(--text2); margin-top:-8px; }
    .name-input { background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); border-radius:14px;
      padding:14px 20px; color:#fff; font-family:'Jua',sans-serif; font-size:18px; text-align:center;
      width:100%; max-width:280px; outline:none; }
    .name-input::placeholder { color:rgba(255,255,255,.35); }
    .name-input:focus { border-color:var(--accent); }
    .over-btns { display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; max-width:280px; }
    .over-btns .btn { width:100%; text-align:center; font-size:16px; padding:14px; }

    /* ── 랭킹 ── */
    #s-rank { justify-content:flex-start; padding-top:30px; gap:12px; }
    .rank-title { font-size:26px; color:#fff; }
    .rank-toggle { display:flex; background:rgba(255,255,255,.08); border-radius:30px; padding:4px; gap:4px; }
    .rank-tab { padding:8px 20px; border-radius:24px; font-family:'Jua',sans-serif; font-size:14px;
      color:var(--text2); cursor:pointer; transition:all .15s; border:none; background:transparent; }
    .rank-tab.active { background:var(--accent); color:#1a0a00; }
    .rank-list { width:100%; max-width:440px; overflow-y:auto; max-height:calc(100vh - 260px); }
    .rank-item { display:flex; align-items:center; gap:12px; padding:12px 16px;
      background:rgba(255,255,255,.06); border-radius:14px; margin-bottom:8px; }
    .rank-pos { font-size:18px; font-weight:900; color:var(--text2); min-width:32px; }
    .rank-pos.gold   { color:#FFD700; }
    .rank-pos.silver { color:#C0C0C0; }
    .rank-pos.bronze { color:#CD7F32; }
    .rank-name { flex:1; color:#fff; font-size:16px; }
    .rank-diff { font-size:12px; color:var(--text2); }
    .rank-score { font-size:20px; font-weight:900; color:var(--accent); }
    .rank-empty { color:var(--text2); font-size:15px; text-align:center; padding:30px; }

    /* 하트 SVG */
    .heart { width:28px; height:28px; }
  </style>
</head>
<body>

<!-- ── 홈 ── -->
<div id="s-home" class="screen active">
  <div style="font-size:64px;margin-bottom:4px">🌍</div>
  <div class="home-title">국기 퀴즈</div>
  <div class="home-sub">세계 국기를 보고 나라 이름을 맞혀보세요!</div>
  <div class="home-best" id="home-best">아직 기록이 없어요</div>

  <div class="diff-row">
    <button class="diff-chip active" data-diff="easy" onclick="selectDiff(this)">🌱 쉬움</button>
    <button class="diff-chip" data-diff="medium" onclick="selectDiff(this)">🌏 보통</button>
    <button class="diff-chip" data-diff="hard" onclick="selectDiff(this)">🔥 어려움</button>
  </div>

  <div class="home-btns">
    <button class="btn btn-primary" onclick="startGame()">시작하기 🚀</button>
    <button class="btn btn-ghost" onclick="showRank()">🏆 랭킹 보기</button>
  </div>
</div>

<!-- ── 게임 ── -->
<div id="s-game" class="screen">
  <div class="game-header">
    <div class="lives" id="lives-ui"></div>
    <div class="stage-badge">STAGE <em id="stage-num">1</em></div>
  </div>

  <div class="timer-wrap">
    <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
    <div class="timer-num" id="timer-num">10</div>
  </div>

  <div class="flag-wrap">
    <img class="flag-img" id="flag-img" src="" alt="국기">
  </div>

  <div class="choices" id="choices"></div>
</div>

<!-- ── 게임오버 ── -->
<div id="s-over" class="screen">
  <div class="over-emoji" id="over-emoji">🌍</div>
  <div class="over-title">게임 종료!</div>
  <div class="over-stage" id="over-stage">0</div>
  <div class="over-label">스테이지 달성</div>
  <input class="name-input" id="name-input" type="text" maxlength="10" placeholder="이름을 입력하세요">
  <div class="over-btns">
    <button class="btn btn-primary" onclick="submitScore()">기록 저장 🏆</button>
    <button class="btn btn-ghost" onclick="startGame()">다시 도전 🔄</button>
    <button class="btn btn-ghost" onclick="showHome()">홈으로 🏠</button>
  </div>
</div>

<!-- ── 랭킹 ── -->
<div id="s-rank" class="screen">
  <div class="rank-title">🏆 랭킹</div>
  <div class="rank-toggle">
    <button class="rank-tab active" onclick="switchRank(this,'global')">전체</button>
    <button class="rank-tab" onclick="switchRank(this,'local')">내 기록</button>
  </div>
  <div class="rank-list" id="rank-list"></div>
  <button class="btn btn-ghost" onclick="showHome()">← 홈으로</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
// ── 데이터 ──────────────────────────────────────────────────────────
const COUNTRIES = [

  { code:'cz', name:'체코',     diff:'medium' },

  { code:'ae', name:'아랍에미리트', diff:'medium' },
  { code:'co', name:'콜롬비아', diff:'medium' },
  { code:'cl', name:'칠레',     diff:'medium' },

  { code:'ua', name:'우크라이나', diff:'medium' },

  { code:'mm', name:'미얀마',   diff:'hard' },
  { code:'lk', name:'스리랑카', diff:'hard' },

  { code:'kz', name:'카자흐스탄', diff:'hard' },
  { code:'uz', name:'우즈베키스탄', diff:'hard' },
  { code:'ge', name:'조지아',   diff:'hard' },
  { code:'am', name:'아르메니아', diff:'hard' },
  { code:'az', name:'아제르바이잔', diff:'hard' },
  { code:'hr', name:'크로아티아', diff:'hard' },
  { code:'rs', name:'세르비아', diff:'hard' },
  { code:'ro', name:'루마니아', diff:'hard' },
  { code:'hu', name:'헝가리',   diff:'hard' },
  { code:'sk', name:'슬로바키아', diff:'hard' },
  { code:'bg', name:'불가리아', diff:'hard' },
  { code:'ee', name:'에스토니아', diff:'hard' },
  { code:'lv', name:'라트비아', diff:'hard' },
  { code:'lt', name:'리투아니아', diff:'hard' },
  { code:'si', name:'슬로베니아', diff:'hard' },
  { code:'al', name:'알바니아', diff:'hard' },
  { code:'is', name:'아이슬란드', diff:'hard' },
  { code:'ie', name:'아일랜드', diff:'hard' },
  { code:'tn', name:'튀니지',   diff:'hard' },
  { code:'dz', name:'알제리',   diff:'hard' },
  { code:'gh', name:'가나',     diff:'hard' },
  { code:'et', name:'에티오피아', diff:'hard' },
  { code:'tz', name:'탄자니아', diff:'hard' },
  { code:'pe', name:'페루',     diff:'hard' },
  { code:'ec', name:'에콰도르', diff:'hard' },
  { code:'bo', name:'볼리비아', diff:'hard' },
  { code:'py', name:'파라과이', diff:'hard' },
  { code:'uy', name:'우루과이', diff:'hard' },
  { code:'cu', name:'쿠바',     diff:'hard' },
  { code:'cr', name:'코스타리카', diff:'hard' },
  { code:'jm', name:'자메이카', diff:'hard' },
];

const DIFF_LABEL = { easy:'🌱 쉬움', medium:'🌏 보통', hard:'🔥 어려움' };
const TIMER_SEC  = 10;

// ── 상태 ──────────────────────────────────────────────────────────────
let pool = [], queue = [], stage = 1, lives = 3, busy = false;
let timerInt = null, timeLeft = TIMER_SEC;
let selectedDiff = 'easy', _db = null;

function flagUrl(code) { return `https://flagcdn.com/w320/${code}.png`; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ── 하트 SVG ──────────────────────────────────────────────────────────
function heartSVG(alive) {
  const c = alive ? '#EF4444' : 'rgba(255,255,255,.15)';
  return `<svg class="heart" viewBox="0 0 24 24"><path fill="${c}" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
}

// ── 로컬 점수 ──────────────────────────────────────────────────────────
function loadLocal() { try { return JSON.parse(localStorage.getItem('flags_scores')||'[]'); } catch{ return []; } }
function saveLocal(name, s, diff) {
  const arr = loadLocal();
  arr.push({ name: name||'익명', stage: s, diff, ts: Date.now() });
  arr.sort((a,b) => b.stage - a.stage);
  localStorage.setItem('flags_scores', JSON.stringify(arr.slice(0,50)));
}
function bestLocal(diff) {
  const arr = loadLocal().filter(s => s.diff === diff);
  return arr.length ? arr[0].stage : 0;
}

// ── Firebase ──────────────────────────────────────────────────────────
function initDB() {
  if (_db) return;
  try {
    if (typeof firebase==='undefined') return;
    if (!firebaseConfig.databaseURL || firebaseConfig.databaseURL.includes('여기에')) return;
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    _db = firebase.database();
  } catch(e) { console.warn('[Firebase]', e); }
}

// ── 화면 전환 ──────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showHome() {
  clearInterval(timerInt);
  const b = bestLocal(selectedDiff);
  document.getElementById('home-best').innerHTML = b
    ? `${DIFF_LABEL[selectedDiff]} 최고: <b>Stage ${b}</b>`
    : '아직 기록이 없어요';
  show('s-home');
}

function selectDiff(btn) {
  document.querySelectorAll('.diff-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedDiff = btn.dataset.diff;
  const b = bestLocal(selectedDiff);
  document.getElementById('home-best').innerHTML = b
    ? `${DIFF_LABEL[selectedDiff]} 최고: <b>Stage ${b}</b>`
    : '아직 기록이 없어요';
}

// ── 게임 시작 ──────────────────────────────────────────────────────────
function getPool() {
  if (selectedDiff === 'easy')   return COUNTRIES.filter(c => c.diff === 'easy');
  if (selectedDiff === 'medium') return COUNTRIES.filter(c => c.diff !== 'hard');
  return COUNTRIES;
}

function startGame() {
  pool  = shuffle(getPool());
  queue = [...pool];
  stage = 1; lives = 3; busy = false;
  renderHUD();
  show('s-game');
  nextFlag();
}

function renderHUD() {
  document.getElementById('lives-ui').innerHTML = [0,1,2].map(i => heartSVG(i < lives)).join('');
  document.getElementById('stage-num').textContent = stage;
}

function nextFlag() {
  if (busy) return;
  if (queue.length < 3) queue = shuffle([...pool]);
  const item = queue.shift();
  const others = shuffle(pool.filter(c => c.code !== item.code)).slice(0, 2);
  const choices = shuffle([item, ...others]);

  document.getElementById('flag-img').src = flagUrl(item.code);

  const el = document.getElementById('choices');
  el.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.name;
    btn.onclick = () => pick(btn, c.code, item);
    el.appendChild(btn);
  });

  // 타이머
  clearInterval(timerInt);
  timeLeft = TIMER_SEC;
  updateTimer();
  timerInt = setInterval(() => {
    timeLeft = Math.max(0, timeLeft - 0.1);
    updateTimer();
    if (timeLeft <= 0) { clearInterval(timerInt); if (!busy) onWrong(item, null); }
  }, 100);
}

function updateTimer() {
  const pct = (timeLeft / TIMER_SEC) * 100;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  document.getElementById('timer-num').textContent = Math.ceil(timeLeft);
  fill.className = 'timer-fill' + (pct <= 30 ? ' danger' : pct <= 60 ? ' warn' : '');
}

function pick(btn, code, item) {
  if (busy) return;
  clearInterval(timerInt);
  if (code === item.code) onCorrect(btn);
  else                    onWrong(item, btn);
}

function onCorrect(btn) {
  busy = true;
  btn.classList.add('correct');
  stage++;
  renderHUD();
  setTimeout(() => { busy = false; nextFlag(); }, 700);
}

function onWrong(item, wrongBtn) {
  busy = true;
  if (wrongBtn) wrongBtn.classList.add('wrong');
  // 정답 표시
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.classList.add('disabled');
    if (b.textContent === item.name) b.classList.add('correct');
  });
  lives--;
  renderHUD();
  if (lives <= 0) { setTimeout(gameOver, 900); return; }
  setTimeout(() => { busy = false; nextFlag(); }, 900);
}

function gameOver() {
  clearInterval(timerInt);
  const reached = stage - 1;
  document.getElementById('over-stage').textContent = reached;
  document.getElementById('over-emoji').textContent = reached > 30 ? '🌟' : reached > 15 ? '🎉' : '🌍';
  document.getElementById('name-input').value = localStorage.getItem('flags_last_name') || '';
  show('s-over');
}

// ── 점수 저장 ──────────────────────────────────────────────────────────
async function submitScore() {
  const reached = stage - 1;
  if (reached === 0) { startGame(); return; }
  const name = document.getElementById('name-input').value.trim() || '익명';
  localStorage.setItem('flags_last_name', name);
  saveLocal(name, reached, selectedDiff);

  initDB();
  if (_db) {
    try {
      await _db.ref('flags_scores').push({ name, stage: reached, diff: selectedDiff, ts: Date.now() });
      console.log('[Firebase] 저장 완료');
    } catch(e) { console.warn('[Firebase]', e); }
  }
  showRank();
}

// ── 랭킹 ──────────────────────────────────────────────────────────────
let rankMode = 'global';

async function showRank() {
  show('s-rank');
  rankMode = 'global';
  document.querySelectorAll('.rank-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  await loadRank();
}

function switchRank(btn, mode) {
  rankMode = mode;
  document.querySelectorAll('.rank-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadRank();
}

async function loadRank() {
  const el = document.getElementById('rank-list');
  el.innerHTML = '<div class="rank-empty">불러오는 중...</div>';

  let scores = [];
  initDB();

  if (rankMode === 'global' && _db) {
    try {
      const snap = await _db.ref('flags_scores').get();
      const data = snap.val();
      if (data) scores = Object.values(data).filter(s => s && s.stage != null);
      scores.sort((a,b) => b.stage - a.stage);
    } catch(e) {
      scores = loadLocal();
    }
  } else {
    scores = loadLocal();
  }

  if (!scores.length) { el.innerHTML = '<div class="rank-empty">아직 기록이 없어요 🌍</div>'; return; }

  const posClass = ['gold','silver','bronze'];
  el.innerHTML = scores.slice(0,10).map((s,i) => `
    <div class="rank-item">
      <div class="rank-pos ${posClass[i]||''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
      <div class="rank-name">
        ${s.name}
        <div class="rank-diff">${DIFF_LABEL[s.diff]||''}</div>
      </div>
      <div class="rank-score">Stage ${s.stage}</div>
    </div>`).join('');
}

// ── 초기화 ──────────────────────────────────────────────────────────────
window.onload = () => {
  const b = bestLocal(selectedDiff);
  document.getElementById('home-best').innerHTML = b
    ? `${DIFF_LABEL[selectedDiff]} 최고: <b>Stage ${b}</b>`
    : '아직 기록이 없어요';
};

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if (sw.state==='installed' && navigator.serviceWorker.controller) sw.postMessage({type:'SKIP_WAITING'});
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
}
</script>
